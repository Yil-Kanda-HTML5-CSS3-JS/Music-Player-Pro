<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Player Pro</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="player-card">
    <div class="header">
      <span>Reproduciendo</span>
      <label for="file-input" class="plus-button">+</label>
      <input type="file" id="file-input" multiple accept="audio/*" />
    </div>

    <div class="album-art">
      <img src="album-art.jpg" id="cover-img" alt="Album Cover">
    </div>

    <div class="info-section">
      <div id="songTitle" class="song-title">Tu biblioteca</div>
      <p id="artistName" class="artist-name">Selecciona archivos para empezar</p>
    </div>

    <audio id="audio" style="display:none;"></audio>

    <div class="controls-main">
      <button onclick="prevTrack()" class="btn-icon">⏮</button>
      <button onclick="togglePlay()" id="playPauseBtn" class="btn-play">▶</button>
      <button onclick="nextTrack()" class="btn-icon">⏭</button>
    </div>

    <div class="playlist-container">
      <h3>Siguiente en la lista</h3>
      <div id="playlist" class="playlist">
        </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
